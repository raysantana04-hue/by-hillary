<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>By Hillary</title>
<img src="logo.png" class="logo">
  <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

  <img src="logo.png" class="logo">

  <h1>By Hillary 💖</h1>

  <p>
    Moda feminina elegante
  </p>

</header>

<nav>

  <a href="#">Início</a>
  <a href="#">Novidades</a>
  <a href="#">Vestidos</a>
  <a href="#">Contato</a>

</nav>

<section class="banner">

  <img src="banner.jpg">

</section>

<section class="busca">

  <input
  type="text"
  id="pesquisa"
  placeholder="Buscar produtos..."
  onkeyup="buscarProduto()">

</section>

<section class="produtos"
id="catalogoProdutos">

</section>

<section class="carrinho">

<h2>
Carrinho 🛒
</h2>

<ul id="carrinho"></ul>

<h3>
Cupom 🎟️
</h3>

<input
type="text"
id="cupom"
placeholder="Digite seu cupom">

<button onclick="aplicarCupom()">
Aplicar
</button>

<p id="desconto">
Desconto: R$ 0,00
</p>

<h3>
Frete 🚚
</h3>

<input
type="text"
id="cep"
placeholder="Digite seu CEP">

<button onclick="calcularFrete()">
Calcular
</button>

<p id="frete">
Frete: R$ 0,00
</p>

<h2 id="total">
Total: R$ 0,00
</h2>

<a href="#">
<button class="finalizar">
Finalizar Compra 💳
</button>
</a>

</section>

<script src="script.js"></script>

</body>

</html>
